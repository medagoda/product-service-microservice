version: "3.8"

# Spins up local infrastructure (Postgres x2 + RabbitMQ) and, optionally, the
# three application services built from their own Dockerfiles.
#
# Quick start (infra only, then run services from your IDE / `mvn spring-boot:run`):
#   docker compose up -d product-db order-db rabbitmq
#
# Full stack (infra + all 3 services containerized):
#   docker compose up -d --build

services:
  product-db:
    image: postgres:16
    container_name: product-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - product_db_data:/var/lib/postgresql/data


  product-service:
    build: .
    container_name: product-service
    restart: unless-stopped
    depends_on:
      - product-db
    environment:
      DB_URL: jdbc:postgresql://product-db:5432/product_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SERVER_PORT: 8081
    ports:
      - "8081:8081"



volumes:
  product_db_data:
